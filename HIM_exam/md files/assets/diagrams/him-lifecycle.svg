<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 260" role="img" aria-labelledby="title desc" font-family="'Apple SD Gothic Neo', 'Malgun Gothic', system-ui, sans-serif">
  <title id="title">보건의료정보 생명주기</title>
  <desc id="desc">보건의료정보가 생성, 수집, 검증, 저장, 활용, 공유, 보존, 폐기의 8단계를 순서대로 거치는 흐름도. 각 단계는 번호가 매겨진 사각형으로 표시되고 화살표로 다음 단계에 연결된다.</desc>
  <style>
    .box { fill: #ffffff; stroke: #1a1a1a; stroke-width: 2; }
    .label { fill: #1a1a1a; font-size: 15px; text-anchor: middle; }
    .num { fill: #1a1a1a; font-size: 12px; font-weight: bold; text-anchor: middle; }
    .arrow { stroke: #1a1a1a; stroke-width: 2; marker-end: url(#arrowhead); fill: none; }
  </style>
  <defs>
    <marker id="arrowhead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1a1a1a"/>
    </marker>
  </defs>

  <!-- 8 stage boxes in two rows of 4, connected in a snake pattern -->
  <!-- Row 1: 생성 -> 수집 -> 검증 -> 저장 -->
  <g>
    <rect class="box" x="20"  y="40" width="110" height="60" rx="6"/>
    <text class="num"   x="75"  y="58">1</text>
    <text class="label" x="75"  y="78">생성</text>

    <rect class="box" x="220" y="40" width="110" height="60" rx="6"/>
    <text class="num"   x="275" y="58">2</text>
    <text class="label" x="275" y="78">수집</text>

    <rect class="box" x="420" y="40" width="110" height="60" rx="6"/>
    <text class="num"   x="475" y="58">3</text>
    <text class="label" x="475" y="78">검증</text>

    <rect class="box" x="620" y="40" width="110" height="60" rx="6"/>
    <text class="num"   x="675" y="58">4</text>
    <text class="label" x="675" y="78">저장</text>

    <rect class="box" x="820" y="40" width="110" height="60" rx="6"/>
    <text class="num"   x="875" y="58">5</text>
    <text class="label" x="875" y="78">활용</text>
  </g>

  <!-- Row 2: 공유 <- 보존 <- 폐기 (visually continues right-to-left under row 1's end) -->
  <g>
    <rect class="box" x="820" y="160" width="110" height="60" rx="6"/>
    <text class="num"   x="875" y="178">6</text>
    <text class="label" x="875" y="198">공유</text>

    <rect class="box" x="620" y="160" width="110" height="60" rx="6"/>
    <text class="num"   x="675" y="178">7</text>
    <text class="label" x="675" y="198">보존</text>

    <rect class="box" x="420" y="160" width="110" height="60" rx="6"/>
    <text class="num"   x="475" y="178">8</text>
    <text class="label" x="475" y="198">폐기</text>
  </g>

  <!-- arrows row 1 -->
  <path class="arrow" d="M130,70 L220,70"/>
  <path class="arrow" d="M330,70 L420,70"/>
  <path class="arrow" d="M530,70 L620,70"/>
  <path class="arrow" d="M730,70 L820,70"/>
  <!-- drop down from 활용(5) to 공유(6) -->
  <path class="arrow" d="M875,100 L875,160"/>
  <!-- arrows row 2 (right to left) -->
  <path class="arrow" d="M820,190 L730,190"/>
  <path class="arrow" d="M620,190 L530,190"/>

  <text x="500" y="250" text-anchor="middle" font-size="13" fill="#444">
    캡션: 정보는 생성부터 폐기까지 8단계를 거치며, 각 단계에서 정확성과 안전성 관리가 필요하다.
  </text>
</svg>
