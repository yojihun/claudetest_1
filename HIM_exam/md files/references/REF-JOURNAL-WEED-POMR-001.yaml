notes: >
  Lawrence Weed가 1968년경 POMR 개념과 SOAP(Subjective-Objective-Assessment-Plan) 구조를 제안한 것은
  보건의료정보관리 교재에서 정설로 다루어지는 역사적 사실이다. 이 세션에서는 원 논문 서지사항(정확한
  권·호·페이지)을 원문 대조하지 않았으므로 status를 located로 둔다. verified 승격 전 원 논문 또는
  신뢰할 수 있는 2차 교재의 정확한 서지정보를 확인해야 한다.
