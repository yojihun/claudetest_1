id: REF-SAFETY-DONOTUSE-ABBREVIATIONS-001
type: official_guideline
title: 의무기록에서 사용을 금지하는 위험 약어(Do Not Use) 목록에 관한 환자안전 지침 개괄
publisher: null
version: null
effective_date: null
accessed_date: null
url: null
language: en
status: located
notes: >
  The Joint Commission 등 환자안전 기관이 "U"(unit을 0으로 오인), "IU"(IV로 오인), 매주 요일 약어
  등 오인 위험이 큰 약어의 사용을 금지하는 목록을 제시하는 것으로 널리 알려져 있다. 국내 의료기관
  인증평가 및 병원 자체 규정에서 통용되는 정확한 목록과 근거 문서는 이 세션에서 원문 대조하지
  않았으므로, 본문에서는 일반 원칙(오인 위험이 큰 약어는 병원 표준 목록에서 금지)만 다루고 구체적
  목록 전체를 확정적으로 제시하지 않는다.
