id: REF-LAW-MEDICAL-SERVICE-ACT-001
type: law
title: 의료법 — 진료기록부 작성·보존·열람 및 전자의무기록 관련 규정
publisher: 국가법령정보센터
version: null
effective_date: null
accessed_date: null
url: null
language: ko
status: located
notes: >
  국내 의료법에는 진료기록부 등의 작성 의무, 보존기간, 열람·사본 발급, 전자의무기록에 관한 조항이
  포함되어 있다고 통상 알려져 있다(예: 진료기록부 작성·비치 의무, 전자의무기록 관련 조항 등).
  다만 이 세션에서는 국가법령정보센터 원문으로 정확한 조번호·현행 시행일을 직접 대조하지
  않았으므로, 본문에서 특정 조번호를 단정적으로 인용하지 않고 "의료법상 진료기록 관련 규정"
  수준으로만 서술한다. verified로 승격하기 전 반드시 국가법령정보센터에서 현행 조문·조번호·
  시행일을 확인해야 한다. (PROJECT.md 11절: 법령 기준일 없는 법규 콘텐츠 배포 금지 원칙에 따름)
