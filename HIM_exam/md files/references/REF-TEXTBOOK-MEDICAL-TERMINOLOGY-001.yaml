notes: >
  그리스·라틴어 기반 의학용어의 어근·접두사·접미사·결합모음 규칙과 계통별(소화기,
  호흡기, 순환기 등) 대표 용어는 여러 의학용어 교재에서 공통적으로 통용되는 정설
  내용이다. 이 세션에서는 특정 교재의 정확한 서지사항을 원문 대조하지 않았으므로
  status를 located로 둔다. GLOSSARY.md의 계통별 표에 정리된 용어 목록을 근거로
  Volume II 콘텐츠를 작성하며, 국내 국가시험 출제범위(국시원 '의학용어 및 기초임상의학')와의
  구체적 일치 여부는 별도 확인이 필요하다.
