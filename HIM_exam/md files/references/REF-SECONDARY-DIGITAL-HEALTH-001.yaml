notes: >
  원격의료, 웨어러블 기기, 생성형 AI 등이 HIM 직무에 미치는 영향은 여러 2차 자료·업계 보고서에서
  공통적으로 언급되는 일반 동향이며, 특정 통계치나 확정적 수치는 포함하지 않는다. 구체적인 수치나
  제도 변화가 필요한 경우 이 참고문헌만으로는 부족하며 최신 공식 자료를 별도로 확인해야 한다.
