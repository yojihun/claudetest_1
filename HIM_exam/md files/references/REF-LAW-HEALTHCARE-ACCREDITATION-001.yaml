title: 국내 의료기관 인증제도 개괄
publisher: null
version: null
effective_date: null
accessed_date: null
url: null
language: ko
status: located
notes: >
  국내에는 의료기관을 대상으로 환자안전·질 향상·정보관리 등 여러 영역을 조사하는 인증제도가
  운영되는 것으로 알려져 있다. 정확한 주관 기관명, 인증 기준의 세부 항목, 인증 주기 등은 이
  세션에서 원문 대조하지 않았으므로, 본문에서는 일반적으로 통용되는 인증 절차의 구조(조사 영역,
  준비, 추적조사 등)만 다루고 구체적 기준·수치는 단정적으로 제시하지 않는다. verified 승격 전
  공식 인증 기관의 최신 기준을 확인해야 한다.
