id: REF-LAW-MEDICAL-TECHNOLOGIST-ACT-001
type: law
title: 의료기사 등에 관한 법률
publisher: 국가법령정보센터
version: null
effective_date: null
accessed_date: 2026-07-19
url: null
language: ko
status: located
notes: >
  국시원 공고 제2025-54호(REF-KUKSIWON-EXAM-2025-054)를 통해 보건의료정보관리사 응시자격의 근거가
  「의료기사 등에 관한 법률」 제4조(자격) 및 제7조(결격사유)임을 확인했다. 다만 보건의료정보관리사의
  구체적 업무범위(예: 시행령 별표상 직무 내용)를 규정하는 정확한 조항·최신 시행일은 이 세션에서
  국가법령정보센터 원문으로 대조하지 못했으므로 status를 located로 둔다. 업무범위·면허 관련 Topic을
  verified로 승격하기 전 국가법령정보센터에서 현행 조문과 시행일을 직접 확인해야 한다.
