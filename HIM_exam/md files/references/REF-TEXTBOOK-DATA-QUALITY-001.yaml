notes: >
  AHIMA의 데이터 품질 관리 프레임워크(Data Quality Management Model 등)에서 정확성(accuracy),
  완전성(completeness), 적시성(timeliness), 일관성(consistency), 무결성(integrity) 등을 데이터 품질
  차원으로 제시하는 것은 HIM 분야에서 널리 통용된다. 이 세션에서는 원 모델 문서의 정확한 버전을
  대조하지 않았으므로 status를 located로 둔다.
