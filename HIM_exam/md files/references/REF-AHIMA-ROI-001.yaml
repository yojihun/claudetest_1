title: Release of Information(정보 제공) 절차에 관한 AHIMA 실무 지침 개괄
publisher: AHIMA
version: null
effective_date: null
accessed_date: null
url: null
language: en
status: located
notes: >
  AHIMA는 환자 본인, 대리인, 제3자에게 진료기록 사본·정보를 제공하는 절차(신원 확인, 동의 확인,
  최소 필요 범위 제공 등)에 관한 실무 지침을 제공하는 것으로 널리 알려져 있다. 국내 의료법·개인정보
  보호법상 열람·사본 발급 절차의 정확한 조문은 이 세션에서 대조하지 않았으므로 국내 법령 관련 서술은
  일반 원칙 수준에 머문다.
