id: REF-AHIMA-CODE-OF-ETHICS-001
type: professional_association
title: AHIMA Code of Ethics 및 보건의료정보관리 전문가 윤리 원칙
publisher: AHIMA
version: null
effective_date: null
accessed_date: null
url: null
language: en
status: located
notes: >
  AHIMA는 정보 보호, 정확성, 전문성, 공정성 등을 축으로 하는 윤리강령을 공식적으로 제공하는 국제
  전문단체다. 국내 보건의료정보관리사에게 직접 적용되는 국내 윤리강령(대한보건의료정보관리사협회
  등)은 이 세션에서 원문 대조하지 못했으므로, verified 승격 전 국내 협회의 공식 윤리강령 문서를
  별도로 확인해야 한다.
