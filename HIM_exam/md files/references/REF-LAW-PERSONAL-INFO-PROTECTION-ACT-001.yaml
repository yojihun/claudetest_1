id: REF-LAW-PERSONAL-INFO-PROTECTION-ACT-001
type: law
title: 개인정보 보호법 — 의료정보(민감정보) 처리, 접근통제, 유출 대응 관련 규정
publisher: 국가법령정보센터
version: null
effective_date: null
accessed_date: null
url: null
language: ko
status: located
notes: >
  개인정보 보호법은 건강정보를 민감정보로 분류해 원칙적으로 더 엄격한 보호를 요구하고, 최소수집·
  목적제한·안전조치 의무 등을 규정하는 것으로 통상 알려져 있다. 이 세션에서는 국가법령정보센터
  원문으로 정확한 조번호·현행 시행일을 대조하지 않았으므로, 본문에서는 특정 조번호를 단정적으로
  인용하지 않고 일반 원칙 수준으로만 서술한다. verified 승격 전 국가법령정보센터에서 현행 조문을
  확인해야 한다.
