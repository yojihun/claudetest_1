id: REF-LAW-NATIONAL-HEALTH-INSURANCE-ACT-001
type: law
title: 국민건강보험법 및 건강보험 청구·심사 관련 제도 개괄
publisher: 국가법령정보센터, 건강보험심사평가원, 국민건강보험공단
version: null
effective_date: null
accessed_date: null
url: null
language: ko
status: located
notes: >
  국내 건강보험 제도는 국민건강보험공단(NHIS, 보험자)과 건강보험심사평가원(HIRA, 심사·평가 기관)의
  역할 분담, 요양기관의 진료비 청구 및 심사 절차, 포괄수가제(DRG)와 행위별수가제의 병행 운영 등을
  포함하는 것으로 널리 알려져 있다. 이 세션에서는 국민건강보험법 등 관련 법령의 정확한 조번호,
  급여율, 수가 기준 등 세부 수치를 원문 대조하지 않았으므로, 본문에서는 제도의 구조와 역할 분담
  수준까지만 다루고 구체적 수치는 단정하지 않는다. verified 승격 전 국가법령정보센터 및 HIRA·NHIS
  공식 자료 확인이 필요하다.
