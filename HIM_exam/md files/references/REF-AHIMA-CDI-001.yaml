notes: >
  임상문서개선(CDI)은 진단·처치 기록이 실제 임상 상태를 정확하고 구체적으로 반영하도록 의료진에게
  질의(query)하는 프로그램으로, AHIMA 등에서 표준적으로 다루는 개념이다. 국내에서 통용되는 정확한
  한국어 명칭과 제도적 도입 현황은 이 세션에서 원문 대조하지 않았다(GLOSSARY.md의 "관리 필요 용어"
  항목 참고).
