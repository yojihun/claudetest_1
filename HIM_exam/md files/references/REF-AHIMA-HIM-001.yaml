notes: >
  AHIMA는 HIM을 "보건의료정보를 수집·관리·분석·보호하여 양질의 의료를 지원하는 전문분야"로 정의하는
  국제적으로 통용되는 1차 출처 기관이다. 이 세션에서는 AHIMA가 해당 정의를 공식적으로 제공하는
  기관이라는 사실만 확인했고, 특정 문서·페이지·최신 개정연도까지는 대조하지 못했다.
