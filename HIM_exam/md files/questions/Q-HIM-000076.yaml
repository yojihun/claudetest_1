stem: "의료기록에서 오류를 발견했을 때 올바른 정정 방법은?"
options:
  - id: A
    text: 원본을 지우고 새 내용으로 다시 작성한다.
  - id: B
    text: 원본을 알아볼 수 있게 남기고, 수정 시점·수정자·사유를 함께 기록한다.
  - id: C
    text: 수정 사실을 기록하지 않고 조용히 고친다.
  - id: D
    text: 원본 작성일로 소급해 수정 내용을 끼워 넣는다.
answer:
