stem: "일반적으로 심장에서 나가는 산소가 풍부한 혈액을 운반하는 혈관은?"
options:
  - id: A
    text: 동맥(Artery)
  - id: B
    text: 정맥(Vein)
  - id: C
    text: 모세혈관(Capillary)
  - id: D
    text: 림프관(Lymphatic vessel)
answer:
  - A
explanation: 동맥은 일반적으로 심장에서 나가는 산소가 풍부한 혈액을 운반한다(폐순환은 예외).
distractor_explanations:
  B: 정맥은 일반적으로 심장으로 돌아오는 산소가 부족한 혈액을 운반한다.
  C: 모세혈관은 동맥과 정맥 사이에서 물질 교환이 일어나는 미세혈관이다.
  D: 림프관은 혈액이 아닌 림프액을 운반하는 별개의 관이다.
references:
  - REF-TEXTBOOK-MEDICAL-TERMINOLOGY-001
