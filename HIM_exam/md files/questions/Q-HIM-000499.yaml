stem: "요도를 통해 비대해진 전립선 조직을 제거해 배뇨 증상을 개선하는 시술은?"
options:
  - id: A
    text: TURP
  - id: B
    text: Vasectomy
  - id: C
    text: Circumcision
  - id: D
    text: Mastectomy
answer:
  - A
explanation: TURP(경요도전립선절제술)는 요도를 통해 비대해진 전립선 조직을 제거하는 시술로 주로 BPH 치료에 사용된다.
distractor_explanations:
  B: Vasectomy(정관절제술)는 피임을 목적으로 정관을 절제하는 시술로 전립선 비대와는 다른 목적이다.
  C: Circumcision(포경수술)은 포피를 절제하는 시술로 전립선과는 무관하다.
  D: Mastectomy(유방절제술)는 유방 조직을 절제하는 여성 생식계통 관련 수술로 전립선과는 다르다.
