importance: A
stem: "'누군가 나를 감시하고 있다'는 명백한 반증에도 확고하게 유지되는 잘못된 믿음을 가리키는 용어는?"
options:
  - id: A
    text: 환각(Hallucination)
  - id: B
    text: 망상(Delusion)
  - id: C
    text: 떨림(Tremor)
  - id: D
    text: 실어증(Aphasia)
answer:
  - B
explanation: 명백한 반증에도 확고하게 유지되는 잘못된 믿음은 사고 내용의 이상인 망상이다.
distractor_explanations:
  A: 환각은 지각(감각)의 이상으로 실제 자극 없이 무언가를 보거나 듣는 것을 가리켜 이 상황과 다르다.
  C: 떨림은 신경계의 운동 증상으로 사고 내용과는 무관하다.
  D: 실어증은 언어 능력 장애로 사고 내용의 이상과는 다른 개념이다.
