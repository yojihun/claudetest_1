  C: 과적합은 모델이 학습 데이터에만 지나치게 맞춰지는 현상으로 이 상황과 다르다.
  D: 위양성은 영상 AI 등에서 실제로 없는 이상을 있다고 판단하는 오류 유형으로 이 상황을 정확히 설명하지 않는다.
