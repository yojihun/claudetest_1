importance: A
stem: "머신러닝 모델 개발 시 '데이터 유출(Data Leakage)'이 발생하는 상황으로 가장 적절한 것은?"
options:
  - id: A
    text: 학습 데이터셋의 크기를 검증 데이터셋보다 크게 설정한 경우
  - id: B
    text: 같은 환자의 검사 기록이 학습 데이터셋과 시험 데이터셋에 모두 포함된 경우
  - id: C
    text: 검증 데이터셋을 사용해 모델의 하이퍼파라미터를 조정한 경우
  - id: D
    text: 학습 데이터셋을 무작위로 섞어 순서를 재배열한 경우
answer:
  - B
explanation: 같은 환자의 데이터가 학습과 시험 데이터셋에 모두 섞이면 모델이 해당 환자 정보를 이미 학습한 상태에서 시험을 치르는 셈이 되어 성능이 과대평가되는 데이터 유출이 발생한다.
distractor_explanations:
  A: 데이터셋 크기 비율 자체는 데이터 유출과 직접 관련이 없다.
  C: 검증 데이터셋으로 하이퍼파라미터를 조정하는 것은 정상적인 절차이다.
  D: 데이터 순서 재배열은 데이터 유출과 무관하다.
