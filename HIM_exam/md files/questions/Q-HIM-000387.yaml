explanation: AI 도구의 도입부터 폐기까지 전 과정을 조직 차원에서 관리하는 정책 체계를 AI 거버넌스라 한다.
distractor_explanations:
  B: 개체명 인식은 NLP 기법으로 조직 관리 체계와 무관하다.
  C: 외부 검증은 모델 성능을 다른 기관 데이터로 재확인하는 절차로, 조직 전반의 관리 체계와는 다른 개념이다.
  D: 데이터 유출 관리는 학습·시험 데이터셋 구성 문제로 이 상황과 관련이 없다.
