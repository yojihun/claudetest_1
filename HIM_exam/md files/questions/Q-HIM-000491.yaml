importance: B
stem: "CKD(만성 신장질환) 진단명에 단계(stage) 정보를 함께 기록하는 것이 중요한 이유는?"
options:
  - id: A
    text: 단계에 따라 중증도와 적용되는 분류 코드가 세분화되기 때문
  - id: B
    text: 단계 정보는 통계에만 사용되고 분류와는 무관하기 때문
  - id: C
    text: 모든 CKD 환자는 동일한 치료를 받기 때문
  - id: D
    text: 단계 정보는 법적으로 기록이 금지되어 있기 때문
answer:
  - A
explanation: CKD는 단계에 따라 중증도가 다르고 이에 따라 분류 코드가 세분화될 수 있어 단계 정보 기록이 중요하다.
distractor_explanations:
  B: 단계 정보는 분류 코드 선택에도 영향을 준다.
  C: CKD 환자는 단계에 따라 치료 접근이 달라진다.
  D: 단계 정보 기록이 금지되어 있다는 것은 사실이 아니다.
