stem: >
  경과기록에 "특이사항 없음"이 5일 연속 동일하게 기재되어 있고, 그중 이틀은 담당의가 아닌 다른
  사람이 대신 로그인해 서명했으며, 한 곳에는 ".25mg"처럼 소수점 앞 "0"이 생략된 표기가 있다.
  이 사례에서 발견되는 세 가지 오류 유형을 각각 설명하시오.
answer:
  - "(1) 복사·붙여넣기(또는 템플릿 클로닝) 오류 - 반복된 '특이사항 없음' (2) 인증 오류 - 대리 로그인 서명 (3) 위험 표기 오류 - 소수점 앞 '0' 생략"
explanation: >
  하나의 사례에 여러 오류 유형이 동시에 존재할 수 있다. 반복된 문구는 확인 없는 복사·템플릿
  재사용의 결과이고, 대리 서명은 인증 원칙 위반이며, 소수점 표기 오류는 위험 약어·표기 원칙
  위반이다. 세 문제 모두 별도의 개선 조치(검토 절차 강화, 서명 정책 재확인, 표준 표기 교육)가 필요하다.
