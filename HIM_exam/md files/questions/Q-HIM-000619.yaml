stem: "퇴원요약지에 'Hemiplegia, sequelae of cerebral infarction'이라고 기록되어 있다. 이를 올바르게 코딩하는 방식은?"
options:
  - id: A
    text: 급성 뇌경색과 동일한 코드로 처리한다.
  - id: B
    text: 급성기 진단과 구분되는 후유증 코드로 분류한다.
  - id: C
    text: 편마비를 별도로 기록하지 않고 무시한다.
  - id: D
    text: 합병증 코드로 처리한다.
answer:
  - B
explanation: 이 기록은 급성 뇌경색의 후유증(편마비)을 나타내므로 급성기 진단과 구분되는 후유증 코드로 분류해야 한다.
distractor_explanations:
  A: 급성 뇌경색과 동일한 코드로 처리하면 이미 종료된 급성 사건과 현재 후유증을 혼동하는 오류이다.
  C: 편마비는 환자의 현재 상태를 나타내는 중요한 정보로 무시해서는 안 된다.
  D: 합병증은 원래 질환·처치의 직접적 결과로 새로 발생한 상태를 가리키며 후유증과는 다른 개념이다.
