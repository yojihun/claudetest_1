stem: "병리 보고서에 'Melanoma, Breslow thickness 2.1mm'라고 기록된 이유는?"
options:
  - id: A
    text: 침습 깊이가 병기 판정과 치료 계획의 핵심 근거이기 때문
  - id: B
    text: 두께 정보는 통계에만 사용되고 병기와 무관하기 때문
  - id: C
    text: 모든 흑색종은 동일한 두께를 가지기 때문
  - id: D
    text: 두께 정보는 법적으로 기록이 금지되어 있기 때문
answer:
  - A
explanation: 흑색종의 침습 깊이(두께)는 병기 판정과 치료 계획 수립의 핵심 근거가 되므로 정확히 기록해야 한다.
distractor_explanations:
  B: 두께 정보는 병기 판정에도 직접 사용된다.
  C: 흑색종의 두께는 병변마다 다르다.
  D: 두께 정보 기록이 금지되어 있다는 것은 사실이 아니다.
