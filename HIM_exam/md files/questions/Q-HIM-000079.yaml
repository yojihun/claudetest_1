stem: "수술기록과 마취기록은 모두 존재했지만 수술 동의서가 누락되어 있었다. 이는 어느 층위의 완전성 문제인가?"
options:
  - id: A
    text: 문서 단위 완전성
  - id: B
    text: 기록 전체 단위 완전성
  - id: C
    text: 내용적 완전성
  - id: D
    text: 완전성과 무관한 문제
answer:
  - B
explanation: 개별 문서는 존재했지만 진료 과정에 필요한 문서 세트(동의서 포함)가 갖추어지지 않았으므로 기록 전체 단위의 완전성 문제다.
distractor_explanations:
  A: 특정 문서 하나의 필수 항목 누락 문제가 아니다.
  C: 문서 자체가 없는 것이므로 내용 채움의 문제가 아니다.
