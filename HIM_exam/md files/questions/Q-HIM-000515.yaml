stem: "당뇨병 진단명에 합병증(신증, 망막병증 등) 동반 여부를 함께 기록하는 것이 중요한 이유는?"
options:
  - id: A
    text: 합병증 유무에 따라 분류 코드가 세분화되기 때문
  - id: B
    text: 합병증 정보는 통계에만 사용되고 분류와 무관하기 때문
  - id: C
    text: 모든 당뇨병 환자는 동일한 합병증을 겪기 때문
  - id: D
    text: 합병증 정보는 법적으로 기록이 금지되어 있기 때문
answer:
  - A
explanation: 합병증 동반 여부에 따라 분류 코드가 세분화되므로 이 정보를 함께 기록해야 정확한 분류가 가능하다.
distractor_explanations:
  B: 합병증 정보는 분류 코드 선택에도 직접 영향을 준다.
  C: 당뇨병 환자마다 합병증 유무와 종류가 다르다.
  D: 합병증 정보 기록이 금지되어 있다는 것은 사실이 아니다.
