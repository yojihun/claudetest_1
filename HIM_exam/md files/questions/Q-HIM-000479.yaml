stem: "퇴원요약지에 'Hepatitis'라고만 기록된 경우, 코딩 담당자가 정확한 분류를 위해 추가로 확인해야 할 정보는?"
options:
  - id: A
    text: 원인(바이러스성, 알코올성, 자가면역성 등)
  - id: B
    text: 환자의 혈액형
  - id: C
    text: 담당 의료진의 이름
  - id: D
    text: 병원의 소재지
answer:
