explanation: 인체 체온으로 불가능한 범위의 값이므로 유효성(범위 규칙) 위반이다.
distractor_explanations:
  A: 정확성은 실제 사실과의 일치 여부를 다루며, 이 값은 애초에 유효 범위를 벗어나 정확성 판단 이전 단계의 문제다.
  C: 시점의 문제가 아니다.
  D: 중복 레코드 문제가 아니다.
