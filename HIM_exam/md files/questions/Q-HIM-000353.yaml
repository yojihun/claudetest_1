stem: "DRG(진단관련군)에 대한 설명으로 가장 적절한 것은?"
options:
  - id: A
    text: 실제 시행된 처치 하나하나마다 별도로 비용을 계산하는 방식이다.
  - id: B
    text: 임상적으로 유사한 환자군을 묶어 정해진 금액을 지급하는 방식이다.
  - id: C
    text: 환자의 만족도만을 기준으로 지급액을 결정하는 방식이다.
  - id: D
    text: 병원의 규모에 따라서만 지급액이 결정되는 방식이다.
answer:
  - B
explanation: DRG는 진단, 처치, 나이, 합병증 등을 기준으로 유사한 환자군을 묶어 정액을 지급하는 방식이다.
distractor_explanations:
  A: 이는 행위별수가제에 가까운 설명이다.
  C: 만족도만으로 결정되지 않는다.
  D: 병원 규모가 아니라 환자군 분류가 기준이다.
