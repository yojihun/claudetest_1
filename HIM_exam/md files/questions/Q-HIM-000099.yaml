stem: "환자의 지인이 위임장 없이 진료 정보를 요청했다. 가장 적절한 대응은?"
options:
  - id: A
    text: 지인이므로 간단한 정보만 알려준다.
  - id: B
    text: 위임 권한을 확인할 수 없으므로 제공을 거부하고 절차를 안내한다.
  - id: C
    text: 환자 본인에게 확인 없이 우선 제공한 뒤 나중에 문제되면 정정한다.
  - id: D
    text: 요청자가 요청했다는 사실만으로 충분하므로 제공한다.
answer:
  - B
explanation: 정당한 권한이 확인되지 않은 요청에는 정보를 제공하지 않고 절차를 안내하는 것이 원칙이다.
distractor_explanations:
  A: 지인이라는 이유만으로는 정당한 권한이 되지 않는다.
  C: 사후 정정으로는 이미 발생한 개인정보 침해를 되돌릴 수 없다.
  D: 요청 사실만으로 권한이 증명되는 것은 아니다.
