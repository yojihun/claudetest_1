stem: "다음 중 CDI(임상문서개선) 질의로 적절한 것은?"
options:
  - id: A
    text: "급성 신부전으로 기재해 주세요."
  - id: B
    text: "이 신부전이 급성인지 만성인지 명확히 기재해 주시겠습니까?"
  - id: C
    text: "가장 수가가 높은 진단명으로 기재해 주세요."
  - id: D
    text: "이전 환자와 동일하게 기재해 주세요."
answer:
  - B
explanation: 특정 답을 유도하지 않고 중립적으로 명확화를 요청하는 것이 적절한 질의다.
distractor_explanations:
  A: 특정 진단명을 유도하는 부적절한 질의다.
  C: 수가를 근거로 진단명을 유도하는 것은 원칙에 어긋난다.
  D: 실제 환자의 임상 상태와 무관하게 기재를 유도하는 것은 부적절하다.
