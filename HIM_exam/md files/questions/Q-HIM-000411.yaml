importance: A
stem: "수술기록에서 환자가 옆으로 누운 자세로 수술받았음에도 절개 부위를 'Anterior aspect'로 기술했다. 이때 Anterior의 기준이 되는 것은?"
options:
  - id: A
    text: 환자가 실제로 누운 자세
  - id: B
    text: 해부학적 자세
  - id: C
    text: 수술 집도의가 서 있는 위치
  - id: D
    text: 영상 촬영 장비의 방향
answer:
  - B
explanation: 방향 용어는 환자의 실제 자세와 무관하게 항상 해부학적 자세(직립, 정면 응시, 손바닥 전방)를 기준으로 표현된다.
distractor_explanations:
  A: 환자의 실제 자세는 방향 용어 표현의 기준이 아니다.
  C: 집도의의 위치는 방향 용어와 무관하다.
  D: 영상 촬영 장비의 방향은 방향 용어의 기준이 아니다.
