  - id: A
    text: 병상이용률
  - id: B
    text: 병상회전율
  - id: C
    text: 병상회전간격
  - id: D
    text: 평균재원일수
answer:
  - C
explanation: 병상회전간격은 병상이 퇴원 후 다음 입원까지 비어있는 평균 기간을 나타낸다.
distractor_explanations:
  A: 병상이용률은 병상이 실제로 얼마나 채워져 있는지를 나타내는 지표로 비어있는 기간과는 다르다.
  B: 병상회전율은 병상 하나가 그 기간 동안 사용된 환자 수를 나타내는 지표다.
  D: 평균재원일수는 퇴원환자의 평균 입원 기간을 나타내는 지표다.
