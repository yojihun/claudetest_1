stem: "피부 표면보다 튀어나오지 않은 편평한 색 변화 병변을 가리키는 용어는?"
options:
  - id: A
    text: 반점(Macule)
  - id: B
    text: 구진(Papule)
  - id: C
    text: 수포(Vesicle)
  - id: D
    text: 홍반(Erythema)
answer:
  - A
explanation: 반점은 피부 표면보다 튀어나오지 않은 편평한 색 변화 병변이다.
distractor_explanations:
  B: 구진은 피부 표면 위로 튀어나온 작고 단단한 병변으로 편평하지 않다.
  C: 수포는 액체가 차 있는 물집으로 편평한 색 변화와는 다르다.
  D: 홍반은 피부가 붉어지는 증상으로 병변의 형태가 아니라 색상 변화를 나타낸다.
