stem: "다음 중 소화효소와 혈당 조절 호르몬을 모두 분비하는 이중 기능 기관은?"
options:
  - id: A
    text: 갑상선
  - id: B
    text: 부신
  - id: C
    text: 췌장
  - id: D
    text: 뇌하수체
answer:
  - C
explanation: 췌장은 소화효소(외분비 기능)와 인슐린·글루카곤(내분비 기능)을 모두 분비하는 이중 기능 기관이다.
distractor_explanations:
  A: 갑상선은 대사 속도를 조절하는 호르몬을 분비하는 순수한 내분비샘이다.
  B: 부신은 스트레스 반응·혈압 조절 호르몬을 분비하는 내분비샘으로 소화효소를 분비하지 않는다.
  D: 뇌하수체는 여러 호르몬을 조절하는 내분비샘으로 소화효소와는 무관하다.
