stem: "피부질환 진단 AI가 특정 피부색 환자의 영상 데이터로 주로 학습되어 다른 피부색 환자에서 진단 정확도가 떨어지는 문제가 나타났다. 이 문제의 근본 원인으로 가장 적절한 것은?"
options:
  - id: A
    text: 학습데이터의 대표성 부족
  - id: B
    text: 시험 데이터셋의 데이터 유출
  - id: C
    text: 생성형 AI의 환각
  - id: D
    text: 개체명 인식 오류
answer:
  - A
explanation: 특정 집단의 데이터로 편중되어 학습된 결과 다른 집단에서 성능이 떨어지는 것은 학습데이터의 대표성 부족(편향)에서 비롯된다.
distractor_explanations:
  B: 데이터 유출은 학습·시험 데이터가 섞이는 문제로 이 상황과 무관하다.
  C: 생성형 AI의 환각은 텍스트 생성 과정의 문제로 영상 진단 정확도 편차와 다른 개념이다.
  D: 개체명 인식 오류는 NLP에서 발생하는 문제로 이 상황과 관련이 없다.
