stem: "식도, 위, 십이지장을 내시경으로 관찰하는 검사는?"
options:
  - id: A
    text: 대장내시경(Colonoscopy)
  - id: B
    text: 상부위장관내시경(EGD)
  - id: C
    text: 간기능검사(LFT)
  - id: D
    text: 결장조루술(Colostomy)
answer:
  - B
explanation: EGD(Esophagogastroduodenoscopy)는 식도·위·십이지장을 관찰하는 상부위장관내시경검사이다.
distractor_explanations:
  A: 대장내시경은 대장을 관찰하는 검사로 상부 소화관과는 다르다.
  C: 간기능검사는 혈액검사로 내시경 검사가 아니다.
  D: 결장조루술은 인공 배변구를 만드는 처치로 검사가 아니다.
