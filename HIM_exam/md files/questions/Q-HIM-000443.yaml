stem: "퇴원요약지에 'Heart disease'라고만 모호하게 기록되어 있을 때, 코딩 담당자가 가장 먼저 해야 할 일은?"
options:
  - id: A
    text: 담당 의료진에게 구체적 진단명(부위·유형)을 재확인한다.
  - id: B
    text: 임의로 가장 흔한 심혈관 질환 코드를 부여한다.
  - id: C
    text: 진단명이 없는 것으로 간주하고 코딩을 생략한다.
  - id: D
    text: 다른 환자의 유사 사례를 참고해 코드를 추정한다.
answer:
  - A
explanation: 모호한 진단명은 정확한 분류가 어려우므로 담당 의료진에게 구체적 정보를 재확인해야 한다.
distractor_explanations:
  B: 임의로 코드를 추정하는 것은 정확한 코딩 원칙에 반한다.
  C: 진단명이 있는데도 코딩을 생략하는 것은 적절하지 않다.
  D: 다른 환자의 사례로 코드를 추정하는 것은 근거 없는 방식이다.
