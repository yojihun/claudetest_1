explanation: 요도는 방광에서 체외로 소변을 배출하는 통로이다.
distractor_explanations:
  A: 요관은 신장에서 방광으로 소변을 운반하는 관으로 방향이 반대이다.
  C: 신우는 신장 내부에서 소변이 모이는 구조로 체외 배출 통로가 아니다.
  D: 사구체는 신장 내부에서 혈액을 여과하는 미세 구조로 배출 통로가 아니다.
