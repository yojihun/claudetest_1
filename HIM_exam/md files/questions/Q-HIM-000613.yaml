stem: "코딩 담당자가 알파벳 색인에서 후보 코드를 찾은 후 반드시 거쳐야 할 다음 단계는?"
options:
  - id: A
    text: 내용예시표(본문표)에서 정확한 정의와 포함·제외 지시를 확인한다.
  - id: B
    text: 후보 코드를 곧바로 최종 코드로 확정한다.
  - id: C
    text: 알파벳 색인의 다음 페이지로 넘어간다.
  - id: D
    text: 다른 환자의 코딩 사례를 참고해 코드를 결정한다.
answer:
  - A
explanation: 알파벳 색인에서 찾은 후보 코드는 내용예시표에서 정확한 정의와 포함·제외 지시를 확인해야 한다.
distractor_explanations:
  B: 확인 절차 없이 곧바로 확정하면 제외 지시를 놓쳐 오류가 발생할 수 있다.
  C: 다음 페이지로 넘어가는 것은 올바른 확인 절차가 아니다.
  D: 다른 환자의 사례를 참고하는 것은 근거 없는 방식이다.
