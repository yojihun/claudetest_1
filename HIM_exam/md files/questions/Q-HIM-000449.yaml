stem: "림프절이나 다른 림프 조직에서 국소적으로 시작해 종괴를 형성하는 혈액암은?"
options:
  - id: A
    text: 백혈병(Leukemia)
  - id: B
    text: 림프종(Lymphoma)
  - id: C
    text: 혈우병(Hemophilia)
  - id: D
    text: 빈혈(Anemia)
answer:
  - B
explanation: 림프종은 림프 조직에서 국소적으로 시작해 종괴를 형성하는 악성 종양이다.
distractor_explanations:
  A: 백혈병은 골수에서 시작해 비정상 백혈구가 혈액 전체에 퍼지는 질환이다.
  C: 혈우병은 응고 인자 결핍으로 인한 출혈 경향 질환으로 악성 종양이 아니다.
  D: 빈혈은 적혈구·헤모글로빈 부족 상태로 종양과는 다른 개념이다.
