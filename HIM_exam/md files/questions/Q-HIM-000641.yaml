explanation: 암등록 대상은 원칙적으로 악성 종양(침습암)과 상피내암을 포함한다.
distractor_explanations:
  B: 양성 종양은 일반적으로 암등록 대상에서 제외된다.
  C: 악성 종양과 상피내암은 등록되어야 한다.
  D: 감염성 질환은 암등록과는 다른 영역이다.
