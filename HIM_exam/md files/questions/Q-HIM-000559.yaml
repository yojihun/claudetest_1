stem: "우울증 진단명에 중증도(경도/중등도/중증) 정보를 함께 기록하는 것이 중요한 이유는?"
options:
  - id: A
    text: 중증도에 따라 진단 코드와 치료 접근이 달라지기 때문
  - id: B
    text: 중증도 정보는 통계에만 사용되고 분류와 무관하기 때문
  - id: C
    text: 모든 우울증 환자는 동일한 치료를 받기 때문
  - id: D
    text: 중증도 정보는 법적으로 기록이 금지되어 있기 때문
answer:
  - A
explanation: 중증도에 따라 진단 코드가 세분화되고 치료 접근도 달라지므로 이 정보가 중요하다.
distractor_explanations:
  B: 중증도 정보는 분류 코드 선택에도 직접 영향을 준다.
  C: 우울증 환자는 중증도에 따라 치료 접근이 다르다.
  D: 중증도 정보 기록이 금지되어 있다는 것은 사실이 아니다.
