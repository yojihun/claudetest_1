stem: "다음 중 뼈와 뼈를 서로 연결해 관절을 안정시키는 구조는?"
options:
  - id: A
    text: 건(Tendon)
  - id: B
    text: 인대(Ligament)
  - id: C
    text: 연골(Cartilage)
  - id: D
    text: 골수(Bone Marrow)
answer:
