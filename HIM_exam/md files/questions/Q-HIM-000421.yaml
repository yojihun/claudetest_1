explanation: 인대는 뼈와 뼈를 서로 연결해 관절을 안정시키는 구조이다.
distractor_explanations:
  A: 건은 근육을 뼈에 연결하는 구조로 인대와 연결 대상이 다르다.
  C: 연골은 관절 표면 등을 덮어 완충 역할을 하는 조직으로 뼈-뼈 연결과는 다르다.
  D: 골수는 뼈 내부에서 조혈 기능을 담당하는 조직으로 이 문제와 관련이 없다.
