id: Q-HIM-000044
status: drafting
type: multiple_choice
topic_ids:
  - HIM-V1-C01-S18-T001
subject_area: health_information_management
difficulty: intermediate
cognitive_level: apply
importance: B
stem: "보건의료정보관리사가 개인적 호기심으로 업무와 무관한 지인의 진료기록을 조회했다. 위반한 윤리 원칙로 가장 적절한 것은?"
options:
  - id: A
    text: 정확성 유지
  - id: B
    text: 최소권한 원칙
  - id: C
    text: 공정성
  - id: D
    text: 위반한 원칙 없음(시스템 접근 권한이 있으므로 문제 없음)
answer:
  - B
explanation: 시스템상 접근이 가능하더라도 업무상 필요 없는 조회는 최소권한 원칙(및 비밀보장 원칙) 위반이다.
distractor_explanations:
  A: 정보를 왜곡하거나 누락한 것이 아니므로 정확성 유지 위반은 아니다.
  C: 특정 환자를 차별적으로 대우한 것이 아니므로 공정성 위반은 아니다.
  D: 기술적 접근 가능 여부와 윤리적 정당성은 별개이므로 틀린 설명이다.
references:
  - REF-AHIMA-CODE-OF-ETHICS-001
verified: false
