subject_area: health_information_management
difficulty: intermediate
cognitive_level: apply
importance: A
stem: "같은 환자의 알레르기 정보가 외래 시스템과 입원 시스템에 서로 다르게 기록되어 있었다. 이는 어떤 품질 특성이 훼손된 사례인가?"
options:
  - id: A
    text: 정확성
  - id: B
    text: 적시성
  - id: C
    text: 일관성
  - id: D
    text: 무결성
answer:
  - C
explanation: 서로 다른 시스템 간 값이 모순되는 것은 일관성이 훼손된 대표적 사례이다.
distractor_explanations:
  A: 정확성은 사실과의 일치 여부이며, 이 사례는 시스템 간 값의 불일치가 핵심 문제다.
  B: 적시성은 필요한 시점에 제공되는지의 문제로 이 사례와 직접 관련이 없다.
  D: 무결성은 허가 없는 변경·훼손 여부의 문제로 이 사례와는 다르다.
