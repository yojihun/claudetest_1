stem: "특정 진단의 청구가 계속 지연되어 조사한 결과 진료부의 퇴원요약 작성이 늦어진 것이 원인이었다. 이 사례가 보여주는 것은?"
options:
  - id: A
    text: 보험심사부의 업무 능력 부족
  - id: B
    text: 정보 흐름 앞 단계의 문제가 뒤 단계로 전파될 수 있다는 것
  - id: C
    text: 정보전산 부서의 시스템 오류
  - id: D
    text: 개인정보 보호 원칙 위반
answer:
