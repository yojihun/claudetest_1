  - id: A
    text: IBS
  - id: B
    text: IBD
  - id: C
    text: GERD
  - id: D
    text: PUD
answer:
  - B
explanation: IBD(Inflammatory Bowel Disease)는 크론병·궤양성 대장염 등 실제 조직 염증을 동반하는 구조적 질환군이다.
distractor_explanations:
  A: IBS(Irritable Bowel Syndrome)는 구조적 손상 없이 기능 이상으로 나타나는 질환이다.
  C: GERD는 위산의 식도 역류로 인한 질환으로 IBD와는 다른 범주이다.
  D: PUD는 소화성 궤양으로 IBD가 포괄하는 염증성 장질환군과는 다른 개별 진단명이다.
