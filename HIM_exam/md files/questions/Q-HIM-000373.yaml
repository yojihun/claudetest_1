stem: "의사의 경과기록과 같은 자유 서술 텍스트에서 진단명, 약물명 등을 자동으로 식별하는 임상 NLP 기술은?"
options:
  - id: A
    text: 개체명 인식
  - id: B
    text: 데이터 유출 탐지
  - id: C
    text: 이미지 분할
  - id: D
    text: 군집화
answer:
  - A
explanation: 텍스트에서 진단명·약물명·증상 등을 식별하는 NLP 기술은 개체명 인식(Named Entity Recognition)이다.
distractor_explanations:
  B: 데이터 유출 탐지는 머신러닝 데이터셋 관리와 관련된 개념으로 NLP의 개체명 식별과 무관하다.
  C: 이미지 분할은 의료영상 AI에서 사용되는 기법으로 텍스트 처리와 관련이 없다.
  D: 군집화는 비지도학습에서 유사한 데이터를 묶는 기법으로 이 상황의 개체 식별과 다르다.
