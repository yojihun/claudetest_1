cognitive_level: apply
importance: A
stem: "수막염이 의심되는 환자에게 척수액을 채취해 감염 여부와 원인균을 확인하기 위해 시행하는 검사는?"
options:
  - id: A
    text: 뇌파검사(EEG)
  - id: B
    text: 요추천자(LP)
  - id: C
    text: 개두술(Craniotomy)
  - id: D
    text: 근전도검사(EMG)
answer:
  - B
explanation: 요추천자는 척수액을 채취하는 검사로 수막염 등의 감염 여부와 원인균 확인에 활용된다.
distractor_explanations:
  A: 뇌파검사는 뇌의 전기적 활동을 기록하는 검사로 척수액 채취와는 다르다.
  C: 개두술은 두개골을 열어 뇌 수술을 시행하는 수술로 척수액 채취 검사가 아니다.
  D: 근전도검사는 근육의 전기적 활동을 측정하는 검사로 척수액 채취와는 다르다.
