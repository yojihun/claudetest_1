stem: "'Pt c/o SOB, hx of COPD'라는 문장에서 SOB가 의미하는 것은?"
options:
  - id: A
    text: 호흡곤란
  - id: B
    text: 상기도 감염
  - id: C
    text: 결핵
  - id: D
    text: 폐기능검사
answer:
  - A
explanation: SOB는 Shortness Of Breath의 약자로 호흡곤란을 의미한다.
distractor_explanations:
  B: 상기도 감염은 URI로 축약되며 SOB와 다르다.
  C: 결핵은 TB로 축약되며 SOB와 다르다.
  D: 폐기능검사는 PFT로 축약되며 증상이 아닌 검사명이다.
