importance: A
stem: "환자 본인이 의식이 명료하고 의사결정 능력이 있는 상태에서, 배우자를 자칭하는 자가 본인 신분증만 제출하고 환자의 동의서 없이 정보 열람을 요청했다. 보건의료정보관리사가 취해야 할 가장 적절한 조치는?"
options:
  - id: A
    text: 정보 제공을 보류하고 환자 본인에게 직접 동의 여부를 확인한다.
  - id: B
    text: 배우자라는 주장을 그대로 신뢰해 즉시 정보를 제공한다.
  - id: C
    text: 요청 자체를 기록하지 않고 무시한다.
  - id: D
    text: 신분증만으로 충분하므로 관계 확인 서류 없이 제공한다.
answer:
  - A
explanation: 환자 본인의 동의나 객관적 관계 확인 서류가 없는 상태에서는 정보 제공을 보류하고 환자 본인에게 직접 확인하는 것이 적절하다.
distractor_explanations:
  B: 자칭 주장만으로 정보를 제공하는 것은 개인정보 보호 원칙에 반한다.
  C: 요청 처리 과정은 기록되어야 하며 무시하는 것은 적절하지 않다.
  D: 신분증만으로는 환자와의 관계나 동의 여부를 확인할 수 없다.
