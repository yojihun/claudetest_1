explanation: 기록되지 않은 수행은 지표에 반영되지 않아 실제보다 낮게 나타나는 왜곡을 일으킨다.
distractor_explanations:
  A: 실제 수행은 이루어졌으므로 질 저하로 단정할 수 없다.
  C: 손위생 효과와 무관한 사례다.
  D: 과정지표 자체가 아니라 기록 완결성이 문제였다.
