stem: "손위생 준수율이 낮게 나타났는데, 실제로는 손위생을 수행했지만 기록으로 남기지 않은 것이 원인이었다. 이 상황이 보여주는 것은?"
options:
  - id: A
    text: 실제 의료의 질이 낮다는 것
  - id: B
    text: 기록 미비가 지표를 실제보다 낮게 왜곡할 수 있다는 것
  - id: C
    text: 손위생 자체가 효과가 없다는 것
  - id: D
    text: 과정지표는 신뢰할 수 없다는 것
answer:
