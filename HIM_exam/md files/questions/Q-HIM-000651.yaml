stem: "환자가 3월 10일 영상검사에서 암이 강하게 의심되었고, 3월 20일 조직검사로 최종 확진되었다. 암등록의 진단일로 일반적으로 채택되는 시점은?"
options:
  - id: A
    text: 3월 10일(임상적 진단일)
  - id: B
    text: 3월 20일(병리학적 확진일)
  - id: C
    text: 두 날짜의 중간일
  - id: D
    text: 퇴원일
answer:
  - A
explanation: 임상적 진단이 병리학적 확진보다 먼저 이루어진 경우, 일반적으로 더 이른 시점(임상적 진단일)을 진단일로 삼는 경향이 있다.
distractor_explanations:
  B: 병리학적 확진일만을 항상 사용하는 것은 아니다.
  C: 두 날짜의 중간일을 사용한다는 규칙은 없다.
  D: 퇴원일은 진단일 결정과 무관하다.
