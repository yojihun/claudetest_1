stem: "의학용어 학습(Volume II)이 병원통계·질병분류 학습(Volume III)의 전제 조건이 되는 이유로 가장 적절한 것은?"
options:
  - id: A
    text: 분류·통계 작업은 의학용어로 기록된 진단명·처치명을 정확히 읽는 것에서 출발하기 때문
  - id: B
    text: 의학용어를 알면 별도의 분류 규칙 학습이 필요 없기 때문
  - id: C
    text: 두 영역은 서로 완전히 무관하기 때문
  - id: D
    text: 통계 산출에는 의학용어가 전혀 사용되지 않기 때문
answer:
  - A
explanation: 의무기록의 진단명·처치명을 정확히 읽는 능력이 있어야 이를 표준 분류 코드로 옮기고 통계를 산출할 수 있다.
distractor_explanations:
  B: 의학용어를 알아도 포함·제외 지시 등 별도의 분류 규칙 학습이 필요하다.
  C: 두 영역은 서로 밀접하게 연결되어 있다.
  D: 통계 산출에도 의학용어로 기록된 진단명 등이 기초 자료로 사용된다.
