stem: "같은 '충수염' 진단이라도 복막염 합병증 동반 여부에 따라 서로 다른 DRG 그룹으로 분류될 수 있다. 이는 DRG 산정에서 무엇을 반영하기 때문인가?"
options:
  - id: A
    text: 기타진단(합병증 동반 여부)
  - id: B
    text: 환자의 거주지
  - id: C
    text: 담당 의료진의 근무 연차
  - id: D
    text: 병원의 병상 수
answer:
  - A
explanation: DRG는 주진단뿐 아니라 기타진단(합병증 동반 여부)도 함께 반영해 세부 그룹을 나눈다.
distractor_explanations:
  B: 환자의 거주지는 DRG 산정 요소가 아니다.
  C: 담당 의료진의 근무 연차는 DRG 산정 요소가 아니다.
  D: 병원의 병상 수는 DRG 산정 요소가 아니다.
