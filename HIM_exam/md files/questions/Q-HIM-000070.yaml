stem: "동의서에 대한 설명으로 가장 적절한 것은?"
options:
  - id: A
    text: 환자의 서명만 있으면 설명 여부와 무관하게 유효한 동의로 인정된다.
  - id: B
    text: 목적, 방법, 위험성, 대안 등에 대한 충분한 설명이 동의서의 핵심이다.
  - id: C
    text: 동의서에 기재된 술식과 실제 시행된 술식은 항상 무관하다.
  - id: D
    text: 응급 상황에서도 사전 동의서 없이는 어떠한 처치도 할 수 없다.
answer:
  - B
explanation: 동의서의 핵심은 서명이 아니라 충분한 설명이 이루어졌는지 여부다.
distractor_explanations:
  A: 설명 없는 서명은 절차적으로 불완전한 동의로 문제될 수 있다.
  C: 동의서 범위와 실제 시행 범위의 일치 여부는 중요한 쟁점이다.
  D: 응급 상황은 별도의 예외적 처리가 필요한 경우로 다루어진다.
