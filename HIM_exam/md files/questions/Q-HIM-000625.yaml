stem: "병리 보고서에서 '위의 상피내암'이 확인되었다. 정확한 코드를 찾기 위해 종양 분류표에서 확인해야 할 두 가지 정보는?"
options:
  - id: A
    text: 원발부위(위)와 성상(상피내암)
  - id: B
    text: 환자의 나이와 성별
  - id: C
    text: 담당 의료진의 전문과목
  - id: D
    text: 병원의 소재지
answer:
  - A
explanation: 종양 분류표는 원발부위별로 성상(양성/악성/상피내암 등)에 따라 코드가 나뉘므로 이 두 정보를 함께 확인해야 한다.
distractor_explanations:
  B: 나이와 성별은 종양 분류표에서 코드를 결정하는 핵심 정보가 아니다.
  C: 담당 의료진의 전문과목은 코드 결정과 무관하다.
  D: 병원의 소재지는 코드 결정과 무관하다.
