stem: "폐렴 진단명에 원인균(세균, 바이러스 등) 정보를 명시하는 것이 중요한 이유는?"
options:
  - id: A
    text: 원인균에 따라 적용되는 분류 코드가 달라질 수 있기 때문
  - id: B
    text: 원인균 정보는 분류와 무관하기 때문
  - id: C
    text: 모든 폐렴은 동일한 코드로 분류되기 때문
  - id: D
    text: 원인균 정보는 통계 작성에만 사용되기 때문
answer:
  - A
explanation: 원인균에 따라 적용되는 분류 코드가 달라질 수 있어, 정확한 분류를 위해 원인균 정보가 필요하다.
distractor_explanations:
  B: 원인균 정보는 분류 코드 선택에 직접 영향을 준다.
  C: 원인균에 따라 서로 다른 코드가 적용될 수 있어 모든 폐렴이 동일하게 분류되지 않는다.
  D: 원인균 정보는 통계뿐 아니라 정확한 진단 분류에도 사용된다.
