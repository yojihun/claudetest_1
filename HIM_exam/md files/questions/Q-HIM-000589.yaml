stem: "이번 달 사망자 수를 이번 달 평균 재원환자 수로 나누어 계산하는 사망률은 다음 중 어느 개념에 해당하는가?"
options:
  - id: A
    text: 비(Ratio)
  - id: B
    text: 율(Rate)
  - id: C
    text: 명목척도
  - id: D
    text: 서열척도
answer:
  - B
explanation: 사망률은 특정 기간(이번 달)을 전제로 사건 수를 대상 인구로 나눈 값으로 율(Rate) 개념에 해당한다.
distractor_explanations:
  A: 비는 서로 다른 두 집단을 단순 비교하는 값으로 시간 개념이 없어 이 상황과 다르다.
  C: 명목척도는 척도의 종류로 비율 개념과는 다른 범주이다.
  D: 서열척도도 척도의 종류로 비율 개념과는 다른 범주이다.
