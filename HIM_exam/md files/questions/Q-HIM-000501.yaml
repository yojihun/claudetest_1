importance: A
stem: "산과 기록에 'G3P2'라고 표기된 환자의 산과력을 올바르게 해석한 것은?"
options:
  - id: A
    text: 총 3번 임신했고 그중 2번 출산했다.
  - id: B
    text: 총 2번 임신했고 그중 3번 출산했다.
  - id: C
    text: 현재 3번째 출산을 진행 중이다.
  - id: D
    text: 자녀가 총 3명이고 유산 경험이 2번이다.
answer:
  - A
explanation: G(Gravida)는 총 임신 횟수, P(Para)는 출산 횟수를 나타내므로 G3P2는 총 3번 임신, 2번 출산을 의미한다.
distractor_explanations:
  B: G와 P의 숫자를 반대로 해석한 오류이다.
  C: G3P2는 현재 진행 중인 출산 횟수를 의미하는 것이 아니라 누적 임신·출산 횟수를 나타낸다.
  D: 자녀 수나 유산 횟수를 직접 나타내는 표기가 아니다.
references:
