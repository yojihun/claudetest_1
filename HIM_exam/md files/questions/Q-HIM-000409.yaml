explanation: 여러 기관이 공통 목적을 위해 함께 작동하는 집합을 계통이라 하며, 이 경우 소화기계에 해당한다.
distractor_explanations:
  A: 세포는 가장 작은 기본 단위로 이 문제의 규모와 다르다.
  B: 조직은 비슷한 세포의 집합으로 기관보다 작은 단위이다.
  C: 기관은 위나 간처럼 개별 장기 하나를 가리키며, 여러 기관의 집합인 계통과 구분된다.
